name: Ingest Stress Test Results
on:
  workflow_dispatch:  # Manual trigger only (annual data)
    inputs:
      test_year:
        description: 'Year of stress test results to ingest'
        required: true
        type: string
      excel_url:
        description: 'URL to the Fed Excel results file'
        required: true
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - run: |
          curl -sL -o stress_test_results.xlsx "${{ inputs.excel_url }}"
          python -m scripts.ingest_stress_tests --file stress_test_results.xlsx --year ${{ inputs.test_year }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
